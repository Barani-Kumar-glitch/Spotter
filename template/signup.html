{% load static %}
<!DOCTYPE html>
<html class="no-js" lang="zxx">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Sign Up</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'assets/img/favicon.png' %}?v=2">
    
    <link rel="manifest" href="{% static 'assets/img/site.webmanifest' %}">
    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/slicknav.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/animate.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/magnific-popup.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/fontawesome-all.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/slick.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/nice-select.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/responsive.css' %}">

   
</head>

<body class="gray-bg">
    <div id="preloader-active">
        <div class="preloader d-flex align-items-center justify-content-center">
            <div class="preloader-inner position-relative">
                <div class="preloader-circle"></div>
                <div class="preloader-img pere-text">
                    <img src="{% static 'assets/img/logo/loder.png' %}" alt="">
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container" style="position: fixed; top: 30px; right: 30px; z-index: 9999;">
        {% if messages %}
            {% for message in messages %}
                <div class="spotter-toast">
                    <span class="toast-icon">⚠</span>
                    <span class="toast-text">{{ message }}</span>
                    <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
                </div>
            {% endfor %}
        {% endif %}
    </div>
    <div class="signup-area">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-6 col-lg-7 col-md-10">
                    <div class="signup-card animated fadeInUp">
                        <div class="text-center mb-40">
                            <h2 class="theme-color">Create Account</h2>
                            <p style="color: white;">Join the Health Coach community today!</p>
                        </div>


                        <form action="{% url 'signup' %}" method="POST">
                            {% csrf_token %}
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label style="color: white;" for="username"><i class="ti-user"></i> Username</label>
                                        <input type="text" name="username" id="username" class="form-control" placeholder="User123" required/>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label style="color: white;" for="email"><i class="ti-email"></i> Email</label>
                                        <input type="email" name="email" id="email" class="form-control" placeholder="example@mail.com" required/>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group mb-3">
                                <label style="color: white;" for="password"><i class="ti-lock"></i> Password</label>
                                <input type="password" name="password" id="password" class="form-control" placeholder="Min 8 characters" required/>
                            </div>

                            <div class="form-group mb-4">
                                <label style="color: white;" for="password2"><i class="ti-check-box"></i> Retype Password</label>
                                <input type="password" name="password2" id="password2" class="form-control" placeholder="Confirm Password" required/>
                            </div>

                            <div class="form-group mb-20">
                                <button type="submit" class="border-btn w-100">Sign Up</button>
                            </div>
                        </form>

                        <div class="text-center mt-30">
                            <p style="color: white;">Already have an account? <a href="{% url 'signin' %}" class="theme-color">Sign In</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toasts = document.querySelectorAll('.spotter-toast');
            toasts.forEach(toast => {
                // Wait 5 seconds, then fade out
                setTimeout(() => {
                    toast.style.animation = "fadeOut 0.5s ease forwards";
                    setTimeout(() => toast.remove(), 500);
                }, 5000);
            });
        });
    </script>
    <script src="{% static 'assets/js/vendor/modernizr-3.5.0.min.js' %}"></script>
    <script src="{% static 'assets/js/vendor/jquery-1.12.4.min.js' %}"></script>
    <script src="{% static 'assets/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.slicknav.min.js' %}"></script>
    <script src="{% static 'assets/js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'assets/js/slick.min.js' %}"></script>
    <script src="{% static 'assets/js/wow.min.js' %}"></script>
    <script src="{% static 'assets/js/jquery.nice-select.min.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
</body>
</html>
